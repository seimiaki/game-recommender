<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <h1>NEXTPLAY</h1>
</head>
<body>
    <p id="welcome-message">Find your next favorite game.</p>

    <div class="welcome-card">
        <h2>Hello, Player.</h2>
        <p id="description">What game are you looking for today?</p>

        <button class="category-btn">Horror</button>
    <button class="category-btn">RPG</button>
    <button class="category-btn">Shooter</button>
    <button class="category-btn">Survival</button>
    <button class="category-btn">Sandbox</button>
    <button class="category-btn">Co-op</button>

<div class="search-container">
 <input type="text" id="game-input" placeholder=" Search for a game, mood, or experience...">
</div>

<button id="recommend-btn">FIND MY NEXT GAME</button>

<div id="modal" class="hidden">
    <div class="game-result">
        <button id="close-btn">✕</button>
        <h2>NEXTPLAY RECOMMENDS</h2>
        <div class="game-cover">Game Cover</div>
        <h3>Cyberpunk 2077</h3>
        <p>RPG • Action • Open World</p>
        <p>A futuristic adventure through a neon city.</p>
        <button id="favorite-btn">❤️ Add to Favorites</button>
    </div>
</div>

    <div>
     <div class="wave"></div>
     <div class="wave"></div>
     <div class="wave"></div>
  </div>

    <script src="script.js"></script>

</body>
</html>
